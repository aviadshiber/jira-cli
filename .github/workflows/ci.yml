on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  push:
    branches: [main]

name: Build

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Pin to 1.25.x to match go.mod's toolchain (go1.25.6). A caret like '^1.25.6'
          # resolves to the latest 1.x (1.26+), which makes golangci-lint - built against
          # 1.25 - panic with "file requires newer Go version go1.26".
          go-version: '1.25.x'

      - name: Install dependencies
        run: make deps

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test
